# Config do gitleaks p/ o repo público do TYPER Magic. Usa as regras default e
# acrescenta um aviso de allowlist para os exemplos de chave por ENV (BYOK), que
# NÃO são segredos — são só o NOME da variável (TYPER_<PROVIDER>_KEY).
title = "TYPER Magic gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Falsos positivos conhecidos (nomes de variáveis BYOK, não segredos)"
regexes = [
  '''TYPER_[A-Z]+_KEY''',
  '''sk-\.\.\.''',
  '''sk-ant-\.\.\.''',
  # client_id PÚBLICOS dos apps oficiais (Claude Code / Codex), usados no login OAuth
  # "com a assinatura". São identificadores públicos do client, NÃO segredos.
  '''9d1c250a-e61b-44d9-88ed-5944d1962f5e''',
  '''app_EMoamEEZ73f0CkXaXp7hrann''',
]
paths = [
  '''(.*?)\.md$''',
  # arte de terminal (logo TYPER MAGO) embarcada em base64 — decorativa, não é segredo.
  '''app/agent-cli/src/banner\.ts$''',
]
